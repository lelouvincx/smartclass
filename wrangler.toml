name = "smartclass-api"
main = "worker/index.js"
compatibility_date = "2026-03-01"

[placement]
mode = "smart"

[vars]
APP_ENV = "development"
APP_CORS_ORIGIN = "http://localhost:5173"
OPENROUTER_MODEL = "google/gemini-2.5-flash"

[[d1_databases]]
binding = "DB"
database_name = "smartclass"
database_id = "34265c7a-6455-4e0c-a166-e0b87e2e8eee"
migrations_dir = "worker/db/migrations"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "smartclass"
